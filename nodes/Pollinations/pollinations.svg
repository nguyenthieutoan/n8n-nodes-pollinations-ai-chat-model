<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="60" height="60">
  <defs>
    <linearGradient id="pollinations-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>
  <!-- Stylized central node and radiating petals/connections -->
  <circle cx="50" cy="50" r="14" fill="url(#pollinations-grad)" />
  <!-- Connecting lines and outer circles -->
  <g stroke="url(#pollinations-grad)" stroke-width="3" opacity="0.85">
    <line x1="50" y1="50" x2="50" y2="15" />
    <line x1="50" y1="50" x2="50" y2="85" />
    <line x1="50" y1="50" x2="15" y2="50" />
    <line x1="50" y1="50" x2="85" y2="50" />
    <line x1="50" y1="50" x2="25" y2="25" />
    <line x1="50" y1="50" x2="75" y2="25" />
    <line x1="50" y1="50" x2="25" y2="75" />
    <line x1="50" y1="50" x2="75" y2="75" />
  </g>
  <g fill="url(#pollinations-grad)">
    <circle cx="50" cy="15" r="5" />
    <circle cx="50" cy="85" r="5" />
    <circle cx="15" cy="50" r="5" />
    <circle cx="85" cy="50" r="5" />
    <circle cx="25" cy="25" r="5" />
    <circle cx="75" cy="25" r="5" />
    <circle cx="25" cy="75" r="5" />
    <circle cx="75" cy="75" r="5" />
  </g>
</svg>
